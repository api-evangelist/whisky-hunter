apis:
  - aid: whisky-hunter:whisky-hunter
    name: Whisky Hunter API
    description: >-
      The Whisky Hunter API provides free, public access to historical whisky auction data aggregated from 28 online
      whisky auction platforms. Endpoints cover aggregated auction statistics, distillery listings, and per-distillery
      historical auction data. No authentication is required. All monetary values are in GBP (£). Only lots actually
      sold (meeting reserve price) are included in trading volume calculations.
    humanURL: https://whiskyhunter.net/api/
    baseURL: https://whiskyhunter.net/api

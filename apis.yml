aid: whisky-hunter
name: Whisky Hunter
description: >-
  Whisky Hunter is a market research and data platform for whisky collectors, investors, traders, and enthusiasts that
  aggregates historical auction data from 28 online whisky auction sites into a single database. It tracks trading
  volumes, winning bids, lot counts, and per-distillery statistics. All trading volumes and winning bids are stated in
  GBP (£). The Whisky Hunter API provides free, public access to this auction data with no authentication required.
type: Index
position: Consumer

naftiko: 1.0.0-alpha2
info:
  label: Whisky Hunter API — Distilleries
  description: 'Whisky Hunter API — Distilleries. 2 operations. Lead operation: List Distilleries. Self-contained Naftiko
    capability covering one Whisky Hunter business surface.'
  tags:
  - Whisky Hunter
  - Distilleries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WHISKY_HUNTER_API_KEY: WHISKY_HUNTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: whisky-hunter-distilleries
    baseUri: https://whiskyhunter.net/api
    description: Whisky Hunter API — Distilleries business capability. Self-contained, no shared references.
    resources:
    - name: distilleries_info
      path: /distilleries_info/
      operations:
      - name: listdistilleries
        method: GET
        description: List Distilleries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: format
          in: query
          type: string
          description: Response format.
    - name: distillery_data-slug
      path: /distillery_data/{slug}/
      operations:
      - name: getdistillerydata
        method: GET
        description: Get Distillery Auction Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: slug
          in: path
          type: string
          description: URL slug identifying the distillery, obtained from the /distilleries_info/ endpoint.
          required: true
        - name: format
          in: query
          type: string
          description: Response format.
  exposes:
  - type: rest
    namespace: whisky-hunter-distilleries-rest
    port: 8080
    description: REST adapter for Whisky Hunter API — Distilleries. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/distilleries-info
      name: distilleries-info
      description: REST surface for distilleries_info.
      operations:
      - method: GET
        name: listdistilleries
        description: List Distilleries
        call: whisky-hunter-distilleries.listdistilleries
        with:
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/distillery-data/{slug}
      name: distillery-data-slug
      description: REST surface for distillery_data-slug.
      operations:
      - method: GET
        name: getdistillerydata
        description: Get Distillery Auction Data
        call: whisky-hunter-distilleries.getdistillerydata
        with:
          slug: rest.slug
          format: rest.format
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: whisky-hunter-distilleries-mcp
    port: 9090
    transport: http
    description: MCP adapter for Whisky Hunter API — Distilleries. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-distilleries
      description: List Distilleries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: whisky-hunter-distilleries.listdistilleries
      with:
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
    - name: get-distillery-auction-data
      description: Get Distillery Auction Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: whisky-hunter-distilleries.getdistillerydata
      with:
        slug: tools.slug
        format: tools.format
      outputParameters:
      - type: object
        mapping: $.
